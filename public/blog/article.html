<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Блог ГектарЪ</title>
  <meta name="description" content="Читайте полезные статьи о земельных инвестициях на блоге Гектарь.">
  <link rel="icon" type="image/png" href="/images/logo.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #1a1a1a;
      --bg-card: #111111;
      --accent-gold: #a08050;
      --accent-gold-hover: #8a7045;
      --accent-green: #4ade80;
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.5);
      --border-color: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
    }

    .nav-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }

    .logo img {
      height: 40px;
      width: auto;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.3s ease;
    }

    .nav-link:hover {
      color: var(--text-primary);
    }

    .nav-link.active {
      color: var(--accent-gold);
    }

    .btn-primary {
      background: var(--accent-gold);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary:hover {
      background: var(--accent-gold-hover);
      transform: translateY(-2px);
    }

    /* Article Header */
    .article-header {
      position: relative;
      min-height: 60vh;
      display: flex;
      align-items: flex-end;
      padding: 8rem 1.5rem 4rem;
      margin-top: 0;
    }

    .article-hero-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .article-header-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10, 10, 10, 0.3) 0%,
        rgba(10, 10, 10, 0.7) 50%,
        var(--bg-primary) 100%
      );
      z-index: 1;
    }

    .article-header-content {
      position: relative;
      z-index: 2;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .article-date {
      color: var(--accent-gold);
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .article-date::before {
      content: '';
      width: 4px;
      height: 4px;
      background: var(--accent-gold);
      border-radius: 50%;
    }

    .article-category {
      background: rgba(160, 128, 80, 0.2);
      color: var(--accent-gold);
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .article-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }

    /* Article Content */
    .article-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem 6rem;
    }

    .article-content {
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--text-secondary);
    }

    .article-content p {
      margin-bottom: 1.5rem;
    }

    .article-content h2 {
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 3rem 0 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border-color);
    }

    .article-content h3 {
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 2rem 0 1rem;
    }

    .article-content ul,
    .article-content ol {
      margin: 1.5rem 0;
      padding-left: 1.5rem;
    }

    .article-content li {
      margin-bottom: 0.75rem;
      position: relative;
    }

    .article-content ul li::marker {
      color: var(--accent-gold);
    }

    .article-content a {
      color: var(--accent-gold);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease;
    }

    .article-content a:hover {
      border-bottom-color: var(--accent-gold);
    }

    .article-content strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .article-content blockquote {
      background: var(--bg-secondary);
      border-left: 4px solid var(--accent-gold);
      padding: 1.5rem 2rem;
      margin: 2rem 0;
      border-radius: 0 12px 12px 0;
      font-style: italic;
    }

    .article-content blockquote p {
      margin: 0;
    }

    /* Back Button */
    .back-section {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      padding: 0.75rem 1.5rem;
      border: 1px solid var(--border-color);
      border-radius: 9999px;
      transition: all 0.3s ease;
    }

    .btn-back:hover {
      color: var(--text-primary);
      border-color: var(--accent-gold);
      background: rgba(160, 128, 80, 0.1);
    }

    .btn-back::before {
      content: '←';
      transition: transform 0.3s ease;
    }

    .btn-back:hover::before {
      transform: translateX(-4px);
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 8rem 2rem;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error State */
    .error-container {
      text-align: center;
      padding: 8rem 2rem;
    }

    .error-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .error-text {
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    /* Footer */
    footer {
      background: #050505;
      border-top: 1px solid var(--border-color);
      padding: 3rem 1.5rem;
    }

    .footer-content {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .footer-logo {
      height: 48px;
      width: auto;
      opacity: 0.8;
    }

    .footer-links {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .footer-link {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer-link:hover {
      color: var(--text-primary);
    }

    .footer-copy {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Social Links */
    .social-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      margin-top: 2rem;
      gap: 1.5rem;
    }

    .social-item {
      position: relative;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      transition: all 0.3s ease;
      text-decoration: none;
      overflow: hidden;
    }

    .social-link svg {
      width: 40px;
      height: 40px;
      color: white;
      flex-shrink: 0;
    }

    .social-link:hover {
      transform: translateY(-3px) scale(1.05);
    }

    .social-link.youtube:hover {
      background: #FF0000;
    }

    .social-link.vk:hover {
      background: #0077FF;
    }

    .social-link.pinterest:hover {
      background: #E60023;
    }

    .social-link.telegram:hover {
      background: #0088CC;
    }

    .social-link.max {
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0;
    }

    .social-link.max img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .social-link.max:hover {
      border-color: var(--accent-gold);
      background: rgba(160, 128, 80, 0.2);
    }

    .star {
      position: absolute;
      top: -4px;
      right: -4px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }

    .disclaimer {
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.75rem;
      text-align: center;
      margin-top: 0.5rem;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }

      .article-header {
        min-height: 50vh;
        padding: 6rem 1rem 3rem;
      }

      .article-container {
        padding: 1.5rem 1rem 4rem;
      }

      .article-content {
        font-size: 1rem;
      }

      .article-content h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

  <script>
    // Format date
    function formatDate(dateString) {
      const date = new Date(dateString);
      const options = { day: 'numeric', month: 'long', year: 'numeric' };
      return date.toLocaleDateString('ru-RU', options);
    }

    // Get slug from URL
    function getSlugFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('slug');
    }

    // Load article
    async function loadArticle() {
      const main = document.getElementById('article-main');
      const slug = getSlugFromUrl();

      if (!slug) {
        main.innerHTML = `
          <div class="error-container">
            <h1 class="error-title">Статья не найдена</h1>
            <p class="error-text">Укажите slug статьи в URL</p>
            <a href="/blog.html" class="btn-primary">Вернуться к статьям</a>
          </div>
        `;
        return;
      }

      try {
        const response = await fetch('/blog/posts.json');
        if (!response.ok) throw new Error('Failed to load posts');
        
        const data = await response.json();
        const post = data.posts.find(p => p.slug === slug);
        
        if (!post) {
          main.innerHTML = `
            <div class="error-container">
              <h1 class="error-title">Статья не найдена</h1>
              <p class="error-text">Запрошенная статья не существует</p>
              <a href="/blog.html" class="btn-primary">Вернуться к статьям</a>
            </div>
          `;
          return;
        }

        // Update page title
        document.title = `${post.title} — Блог ГектарЪ`;

        main.innerHTML = `
          <article>
            <header class="article-header">
              <img 
                src="${post.image}" 
                alt="${post.title}" 
                class="article-hero-image"
                onerror="this.src='/blog/images/placeholder.jpg'"
              >
              <div class="article-header-overlay"></div>
              <div class="article-header-content">
                <div class="article-meta">
                  <span class="article-date">${formatDate(post.date)}</span>
                  <span class="article-category">Полезное</span>
                </div>
                <h1 class="article-title">${post.title}</h1>
              </div>
            </header>
            
            <div class="article-container">
              <div class="article-content">
                ${post.content}
              </div>
            </div>
            
            <div class="back-section">
              <a href="/blog.html" class="btn-back">Назад к статьям</a>
            </div>
          </article>
        `;

      } catch (error) {
        console.error('Error loading article:', error);
        main.innerHTML = `
          <div class="error-container">
            <h1 class="error-title">Ошибка загрузки</h1>
            <p class="error-text">Не удалось загрузить статью. Пожалуйста, попробуйте позже.</p>
            <a href="/blog.html" class="btn-primary">Вернуться к статьям</a>
          </div>
        `;
      }
    }

    // Load article on page load
    document.addEventListener('DOMContentLoaded', loadArticle);
  </script>
